<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="white" opacity="0"/>
  
  <!-- Four connected squares representing "spaces" -->
  <rect x="16" y="16" width="32" height="32" rx="4" fill="#0078d4" opacity="0.9"/>
  <rect x="80" y="16" width="32" height="32" rx="4" fill="#0078d4" opacity="0.85"/>
  <rect x="16" y="80" width="32" height="32" rx="4" fill="#0078d4" opacity="0.85"/>
  <rect x="80" y="80" width="32" height="32" rx="4" fill="#0078d4" opacity="0.9"/>
  
  <!-- Connection lines between squares -->
  <line x1="48" y1="32" x2="80" y2="32" stroke="#0078d4" stroke-width="2" opacity="0.6"/>
  <line x1="32" y1="48" x2="32" y2="80" stroke="#0078d4" stroke-width="2" opacity="0.6"/>
  <line x1="96" y1="48" x2="96" y2="80" stroke="#0078d4" stroke-width="2" opacity="0.6"/>
  <line x1="48" y1="96" x2="80" y2="96" stroke="#0078d4" stroke-width="2" opacity="0.6"/>
  
  <!-- Plug icon in bottom right -->
  <g transform="translate(88, 96)">
    <!-- Plug body -->
    <rect x="2" y="4" width="12" height="16" rx="2" fill="#0078d4"/>
    <!-- Left prong -->
    <rect x="4" y="20" width="2" height="6" fill="#0078d4"/>
    <!-- Right prong -->
    <rect x="10" y="20" width="2" height="6" fill="#0078d4"/>
  </g>
</svg>